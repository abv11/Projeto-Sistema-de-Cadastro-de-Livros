{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Livros - Excluir</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="menu">
        <a href="{% url 'home' %}">Home</a> |
        <a href="{% url 'cadastro' %}">Cadastrar Livro</a> |
        <a href="{% url 'consulta' %}">Consultar por Nome</a> |
        <a href="{% url 'listar' %}">Listar Livros</a> |
        <a href="{% url 'sobre' %}">Sobre</a> |
        <a href="{% url 'contato' %}">Contato</a>
    </div>

    <h1>Confirmar Exclusão</h1>

    <p>Você tem certeza que deseja excluir o livro:</p>
    <p><strong>{{ livro.titulo }}</strong> ({{ livro.autor }})</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Sim, excluir</button>
        <a class="botao" href="{% url 'listar' %}">Não, voltar</a>
    </form>
</body>
</html>
