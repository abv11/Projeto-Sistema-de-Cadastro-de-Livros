{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Livros - Contato</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="menu">
        <a href="{% url 'home' %}">Home</a> |
        <a href="{% url 'cadastro' %}">Cadastrar Livro</a> |
        <a href="{% url 'consulta' %}">Consultar por Nome</a> |
        <a href="{% url 'listar' %}">Listar Livros</a> |
        <a href="{% url 'sobre' %}">Sobre</a> |
        <a href="{% url 'contato' %}">Contato</a>
    </div>

    <h1>Contato</h1>

    {% if mensagem %}
        <p class="ok">{{ mensagem }}</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <div class="formulario">
            <label for="nome">Nome:</label><br>
            <input type="text" id="nome" name="nome" value="{{ nome }}"><br><br>

            <label for="email">Email:</label><br>
            <input type="text" id="email" name="email" value="{{ email }}"><br><br>

            <label for="mensagem">Mensagem:</label><br>
            <textarea id="mensagem" name="mensagem" rows="4" cols="40">{{ texto }}</textarea><br><br>
        </div>

        <button type="submit">Enviar</button>
    </form>
</body>
</html>
